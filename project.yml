# GTO Academy — XcodeGen 工程定义
# 用法: brew install xcodegen && xcodegen generate && open GTOAcademy.xcodeproj
#
# "Multiple commands produce / duplicate output file"（Xcode 26 本地，CI Xcode 16 不报）：
# 根因是 createIntermediateGroups: true 在新版 Xcode 构建系统下，为包含资源的中间分组
# 重复登记 copy-resource 命令。修复 = 关闭该选项（默认 false）。全树已核验无同名资源。
name: GTOAcademy
options:
  bundleIdPrefix: com.yourcompany # TODO: 替换为你的反向域名
  deploymentTarget:
    iOS: "18.0"
  # createIntermediateGroups 不设置（默认 false）：避免子目录资源被重复登记。

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.1.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # DEVELOPMENT_TEAM: "ABCDE12345" # 在 Xcode Signing 面板选择，或取消注释填 Team ID

targets:
  GTOAcademy:
    type: application
    platform: iOS
    # 单一 source 树：.swift 编译，.xcassets 资产编译，.json/.xcprivacy 资源拷贝。
    # 全树无同名资源（已离线核验），同一 resources phase 内不会重复输出。
    sources:
      - path: GTOAcademy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.gtoacademy # TODO: 替换
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        INFOPLIST_KEY_CFBundleDisplayName: "GTO Academy"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  GTOAcademyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GTOAcademyTests
    dependencies:
      - target: GTOAcademy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.gtoacademy.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GTOAcademy.app/GTOAcademy"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  GTOAcademy:
    build:
      targets:
        GTOAcademy: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - GTOAcademyTests
