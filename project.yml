# GTO Academy — XcodeGen 工程定义
# 用法: brew install xcodegen && xcodegen generate && open GTOAcademy.xcodeproj
name: GTOAcademy
options:
  bundleIdPrefix: com.yourcompany # TODO: 替换为你的反向域名
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # DEVELOPMENT_TEAM: "ABCDE12345" # 在 Xcode Signing 面板选择，或取消注释填 Team ID

targets:
  GTOAcademy:
    type: application
    platform: iOS
    sources:
      - path: GTOAcademy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.gtoacademy # TODO: 替换
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        INFOPLIST_KEY_CFBundleDisplayName: "GTO Academy"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  GTOAcademyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GTOAcademyTests
    dependencies:
      - target: GTOAcademy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.gtoacademy.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GTOAcademy.app/GTOAcademy"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  GTOAcademy:
    build:
      targets:
        GTOAcademy: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - GTOAcademyTests
