# Release · TestFlight — 手动触发的发布管线（云端自动签名，无需本地 Mac）
# 前置：在仓库 Settings → Secrets and variables → Actions 配好 5 个 Secrets，
# 步骤与排障详见 Docs/TestFlight.md。
name: Release · TestFlight

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "营销版本号（CFBundleShortVersionString，如 1.1.0）"
        required: true
        default: "1.1.0"

jobs:
  validate-content:
    name: 内容校验（Ubuntu 秒级先把关）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate content JSON
        run: python3 tools/validate_content.py

  upload-testflight:
    name: 云端签名并直传 App Store Connect
    needs: validate-content
    runs-on: macos-15
    timeout-minutes: 45
    env:
      BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          printf '%s' "${{ secrets.ASC_API_KEY_P8 }}" > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Archive（云端自动签名）
        run: |
          mkdir -p build
          set -o pipefail
          xcodebuild archive \
            -project GTOAcademy.xcodeproj \
            -scheme GTOAcademy \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/GTOAcademy.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="${{ inputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            2>&1 | tee build/archive.log

      - name: Export & upload（直传 TestFlight）
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
            <key>manageAppVersionAndBuildNumber</key><false/>
          </dict>
          </plist>
          EOF
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/GTOAcademy.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            2>&1 | tee build/export.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: build/*.log
          if-no-files-found: ignore
